<header class="site-header">
  <div class="container">
    <nav class="terminal-header" aria-label="Main navigation">
      <div class="terminal-header-top">
        <div class="terminal-dots" aria-hidden="true">
          <span class="terminal-dot dot-red"></span>
          <span class="terminal-dot dot-amber"></span>
          <span class="terminal-dot dot-green"></span>
        </div>
        <p class="terminal-title">{{ site.title }}: terminal blog</p>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <div class="terminal-header-body">
        <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="{{ site.title }} home">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <polygon points="14,2 24,8 24,20 14,26 4,20 4,8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <polygon points="14,2 24,8 14,13 4,8" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" opacity="0.5"/>
            <circle cx="14" cy="14" r="2.5" fill="currentColor" opacity="0.9"/>
          </svg>
          <span>{{ site.title }}</span>
        </a>

        <div class="terminal-command">
          <span class="terminal-prompt" aria-hidden="true">$</span>
          <ul class="terminal-nav-links">
            <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>home</a></li>
            <li><a href="{{ '/archive/' | relative_url }}"{% if page.url == '/archive/' or page.layout == 'post' %} aria-current="page"{% endif %}>archive</a></li>
            <li><a href="{{ '/categories/' | relative_url }}"{% if page.url == '/categories/' %} aria-current="page"{% endif %}>categories</a></li>
            <li><a href="{{ '/tags/' | relative_url }}"{% if page.url == '/tags/' %} aria-current="page"{% endif %}>tags</a></li>
            <li><a href="{{ '/pages/' | relative_url }}"{% if page.url == '/pages/' %} aria-current="page"{% endif %}>pages</a></li>
          </ul>
        </div>

        <a class="btn-nav" href="{{ '/archive/' | relative_url }}">Latest posts</a>
      </div>
    </nav>
  </div>
</header>
