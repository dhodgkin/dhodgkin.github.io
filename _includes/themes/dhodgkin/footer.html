<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <polygon points="14,2 24,8 24,20 14,26 4,20 4,8" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="14" cy="14" r="2.5" fill="currentColor"/>
      </svg>
      <span>{{ site.title }}</span>
    </div>

    <nav class="footer-links" aria-label="Footer navigation">
      <a href="{{ '/archive/' | relative_url }}">Archive</a>
      <a href="{{ '/pages/' | relative_url }}">Pages</a>
      <a href="{{ site.author.github }}" rel="noopener noreferrer">GitHub</a>
      <a href="{{ '/atom.xml' | relative_url }}">Feed</a>
    </nav>

    <p class="footer-copy">
      &copy; {{ site.time | date: "%Y" }} {{ site.author.name }} · Built with Jekyll
    </p>
  </div>
</footer>
